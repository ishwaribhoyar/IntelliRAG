<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.3"/>
  
  <!-- Neural network nodes -->
  <circle cx="160" cy="160" r="8" fill="#60a5fa" opacity="0.6"/>
  <circle cx="352" cy="160" r="8" fill="#a855f7" opacity="0.6"/>
  <circle cx="160" cy="352" r="8" fill="#818cf8" opacity="0.6"/>
  <circle cx="352" cy="352" r="8" fill="#60a5fa" opacity="0.6"/>
  <circle cx="256" cy="128" r="6" fill="#c084fc" opacity="0.4"/>
  <circle cx="128" cy="256" r="6" fill="#60a5fa" opacity="0.4"/>
  <circle cx="384" cy="256" r="6" fill="#a855f7" opacity="0.4"/>
  <circle cx="256" cy="384" r="6" fill="#818cf8" opacity="0.4"/>
  
  <!-- Neural connections -->
  <line x1="160" y1="160" x2="256" y2="200" stroke="#60a5fa" stroke-width="1.5" opacity="0.2"/>
  <line x1="352" y1="160" x2="256" y2="200" stroke="#a855f7" stroke-width="1.5" opacity="0.2"/>
  <line x1="160" y1="352" x2="256" y2="310" stroke="#818cf8" stroke-width="1.5" opacity="0.2"/>
  <line x1="352" y1="352" x2="256" y2="310" stroke="#60a5fa" stroke-width="1.5" opacity="0.2"/>
  <line x1="256" y1="128" x2="256" y2="200" stroke="#c084fc" stroke-width="1.5" opacity="0.2"/>
  <line x1="128" y1="256" x2="200" y2="256" stroke="#60a5fa" stroke-width="1.5" opacity="0.2"/>
  <line x1="384" y1="256" x2="312" y2="256" stroke="#a855f7" stroke-width="1.5" opacity="0.2"/>
  <line x1="256" y1="384" x2="256" y2="310" stroke="#818cf8" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Central brain/book shape -->
  <g filter="url(#shadow)">
    <!-- Book base -->
    <path d="M200 200 L256 180 L312 200 L312 320 L256 340 L200 320 Z" fill="url(#glow)" opacity="0.15"/>
    <path d="M256 180 L256 340" stroke="url(#inner)" stroke-width="2" opacity="0.4"/>
    
    <!-- Left page -->
    <path d="M210 210 L250 195 L250 325 L210 310 Z" fill="url(#glow)" opacity="0.1"/>
    <!-- Right page -->
    <path d="M262 195 L302 210 L302 310 L262 325 Z" fill="url(#glow)" opacity="0.1"/>
  </g>
  
  <!-- Main "I" lettermark -->
  <g filter="url(#glow-filter)">
    <!-- Top serif -->
    <rect x="220" y="195" width="72" height="12" rx="4" fill="url(#inner)"/>
    <!-- Vertical stroke -->
    <rect x="244" y="195" width="24" height="130" rx="4" fill="url(#inner)"/>
    <!-- Bottom serif -->
    <rect x="220" y="313" width="72" height="12" rx="4" fill="url(#inner)"/>
  </g>
  
  <!-- Sparkle dots -->
  <circle cx="190" cy="190" r="3" fill="#f0abfc" opacity="0.7"/>
  <circle cx="322" cy="190" r="3" fill="#93c5fd" opacity="0.7"/>
  <circle cx="190" cy="330" r="3" fill="#93c5fd" opacity="0.7"/>
  <circle cx="322" cy="330" r="3" fill="#f0abfc" opacity="0.7"/>
  
  <!-- "IntelliRAG" text below -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#inner)" letter-spacing="8">IntelliRAG</text>
  <text x="256" y="446" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#94a3b8" letter-spacing="4">LLM</text>
</svg>
